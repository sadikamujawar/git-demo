<html>
<head>
<style>

button {
  padding: 10px 20px;
  color: #0ff;
  background: black;
  border: 2px solid #0ff;
  transition: 0.7s;
  border-radius:20px;
  margin-top:20px;
  cursor:pointer;
}

button:hover {
  box-shadow: 0 0 10px #0ff,
              0 0 20px #0ff,
              0 0 40px #0ff;
	transform:translate(0px,-10px);
}

</style>
</head>

<body>

<button>Neon Button</button>

</body>
</html>
